<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЧМ-2026 · Семейный конкурс</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; font-size: 17px; line-height: 1.5;
         color: #1a1a1a; background: #f4f4f0; padding: 12px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  header { padding: 10px 4px 16px; }
  h1 { font-size: 21px; font-weight: 600; }
  .upd { font-size: 13px; color: #8a8a84; margin-top: 2px; }
  section { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px;
            border: 1px solid #e4e4de; }
  h2 { font-size: 17px; font-weight: 600; margin-bottom: 12px; }
  .day-sub { font-weight: 400; color: #8a8a84; font-size: 14px; }
  .match { padding: 12px 0; border-top: 1px solid #efefe9; }
  .match:first-of-type { border-top: none; }
  .meta { font-size: 13px; color: #8a8a84; margin-bottom: 6px; }
  .teams { display: flex; align-items: center; gap: 8px; font-size: 17px; font-weight: 600; flex-wrap: wrap; }
  .teams img { width: 24px; height: 18px; border-radius: 2px; border: 1px solid #e4e4de; }
  .score { margin-left: auto; font-size: 19px; }
  .scorers { font-size: 14px; color: #555; margin-top: 6px; }
  .review { font-size: 15px; margin-top: 8px; color: #333; }
  .chips { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 13px; padding: 3px 10px; border-radius: 12px; background: #f0f0ea; color: #66665f; }
  .chip.p5 { background: #d9f0dc; color: #1e6b2e; font-weight: 600; }
  .chip.p34 { background: #fdeece; color: #8a5d05; }
  .chip.p12 { background: #ececff; color: #4a4a9c; }
  .preds { font-size: 14px; color: #555; margin-top: 8px; line-height: 1.7; }
  table { width: 100%; border-collapse: collapse; font-size: 16px; }
  td, th { padding: 8px 6px; text-align: left; border-top: 1px solid #efefe9; }
  th { font-size: 13px; color: #8a8a84; font-weight: 500; border-top: none; }
  td.r, th.r { text-align: right; }
  tr.top td { background: #fbf6e3; font-weight: 600; }
  .exact { font-size: 13px; color: #8a8a84; }
  details { border-top: 1px solid #efefe9; }
  details:first-of-type { border-top: none; }
  summary { padding: 12px 4px; font-size: 16px; font-weight: 600; cursor: pointer; }
  summary .day-sub { font-size: 13px; }
  footer { text-align: center; font-size: 13px; color: #8a8a84; padding: 8px 0 20px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>⚽ ЧМ-2026 · Семейный конкурс</h1>
    <div class="upd" id="upd"></div>
  </header>
  <section id="latest"></section>
  <section id="table-sec"></section>
  <section id="next"></section>
  <section id="archive-sec"></section>
  <footer>Семейный конкурс прогнозов · обновляется по утрам</footer>
</div>
<script>
const FLAGS = {"Мексика":"mx","ЮАР":"za","Юж. Корея":"kr","Чехия":"cz","Канада":"ca","Босния":"ba",
"Катар":"qa","Швейцария":"ch","Бразилия":"br","Марокко":"ma","Гаити":"ht","Шотландия":"gb-sct",
"США":"us","Парагвай":"py","Австралия":"au","Турция":"tr","Германия":"de","Кюрасао":"cw",
"Кот-д'Ивуар":"ci","Эквадор":"ec","Нидерланды":"nl","Япония":"jp","Швеция":"se","Тунис":"tn",
"Бельгия":"be","Египет":"eg","Иран":"ir","Нов. Зеландия":"nz","Испания":"es","Кабо-Верде":"cv",
"Сауд. Аравия":"sa","Уругвай":"uy","Франция":"fr","Сенегал":"sn","Ирак":"iq","Норвегия":"no",
"Аргентина":"ar","Алжир":"dz","Австрия":"at","Иордания":"jo","Португалия":"pt","ДР Конго":"cd",
"Узбекистан":"uz","Колумбия":"co","Англия":"gb-eng","Хорватия":"hr","Гана":"gh","Панама":"pa"};
const MONTHS = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];

function flag(team) {
  const c = FLAGS[team.trim()];
  return c ? `<img src="https://flagcdn.com/48x36/${c}.png" width="24" height="18" alt="">` : "";
}
function dayDate(matches) {
  const m = matches[0];
  const [d, mo] = m.date.split(".").map(Number);
  return `${d} ${MONTHS[mo-1]}`;
}
function chipClass(p) { return p === 5 ? "chip p5" : p >= 3 ? "chip p34" : p >= 1 ? "chip p12" : "chip"; }
function chipsHtml(points) {
  const entries = Object.entries(points).filter(([, v]) => v !== null && v !== undefined && v !== "—");
  entries.sort((a, b) => b[1] - a[1]);
  return `<div class="chips">` + entries.map(([n, p]) =>
    `<span class="${chipClass(p)}">${n} ${p > 0 ? "+" + p : "0"}</span>`).join("") + `</div>`;
}
function matchCard(m, withReview) {
  let h = `<div class="match"><div class="meta">${m.time} МСК · ${m.stage}</div>
    <div class="teams">${flag(m.team1)} ${m.team1} — ${m.team2} ${flag(m.team2)}
    <span class="score">${m.score || ""}</span></div>`;
  if (m.scorers) h += `<div class="scorers">⚽ ${m.scorers}</div>`;
  if (withReview && m.review) h += `<div class="review">${m.review}</div>`;
  if (m.score && m.points) h += chipsHtml(m.points);
  return h + `</div>`;
}
function predsLine(m, participants) {
  return participants.map(p => `${p} ${m.preds[p] || "—?"}`).join(" · ");
}

fetch("data.json?v=" + Date.now()).then(r => r.json()).then(d => {
  document.getElementById("upd").textContent = "Обновлено " + d.generated_at_text;
  const byDay = {};
  d.matches.forEach(m => (byDay[m.day] = byDay[m.day] || []).push(m));
  const days = Object.keys(byDay).map(Number).sort((a, b) => a - b);
  const playedDays = days.filter(day => byDay[day].some(m => m.score));
  const latestDay = playedDays.length ? Math.max(...playedDays) : null;

  if (latestDay) {
    const ms = byDay[latestDay].filter(m => m.score);
    document.getElementById("latest").innerHTML =
      `<h2>📰 День ${latestDay} <span class="day-sub">· ${dayDate(byDay[latestDay])} · результаты</span></h2>` +
      ms.map(m => matchCard(m, true)).join("");
  } else document.getElementById("latest").style.display = "none";

  document.getElementById("table-sec").innerHTML = `<h2>🏆 Таблица</h2>
    <table><tr><th>#</th><th>Участник</th><th class="r">Очки</th><th class="r">Точные</th></tr>` +
    d.standings.map((s, i) =>
      `<tr${i === 0 ? ' class="top"' : ""}><td>${i + 1}</td><td>${s.name}</td>
       <td class="r">${s.points}</td><td class="r exact">${s.exact || "—"}</td></tr>`).join("") + `</table>`;

  const futureDays = days.filter(day => byDay[day].some(m => !m.score));
  const nextDay = futureDays.length ? Math.min(...futureDays) : null;
  if (nextDay) {
    const ms = byDay[nextDay].filter(m => !m.score);
    document.getElementById("next").innerHTML =
      `<h2>⏰ День ${nextDay} <span class="day-sub">· ${dayDate(byDay[nextDay])} · прогнозы</span></h2>` +
      ms.map(m => matchCard(m, false) +
        `<div class="preds">${predsLine(m, d.participants)}</div>`).join("");
  } else document.getElementById("next").style.display = "none";

  const archDays = playedDays.filter(day => day !== latestDay).sort((a, b) => b - a);
  if (archDays.length) {
    document.getElementById("archive-sec").innerHTML = `<h2>📚 Предыдущие дни</h2>` +
      archDays.map(day => `<details><summary>День ${day} <span class="day-sub">· ${dayDate(byDay[day])}</span></summary>` +
        byDay[day].filter(m => m.score).map(m => matchCard(m, true)).join("") + `</details>`).join("");
  } else document.getElementById("archive-sec").style.display = "none";
});
</script>
</body>
</html>
